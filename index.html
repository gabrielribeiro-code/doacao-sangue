<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">

    <title>Formulario de Sistema de Captação de Dados para Doação de Sangue </title>
</head>

<body>


    <div class="container">

        <div class="borda"></div>
        <h3> Cadastro - formulário - Doação de Sangue </h3>

        <form action="" id="formulario">

            <label for="nome"> Nome: </label><br>
            <input type="text" id="nome" required placeholder="Nome">
            <br><br>


            <label for="email"> Email: </label><br>
            <input type="text" id="email"  placeholder="Email">
            <br><br>

            <label for="peso"> Peso: </label><br>
            <input type="number" id="peso" required placeholder="Peso">
            <br><br>

            <label for="telefone"> Telefone: </label><br>
            <input type="text" id="telefone" required placeholder="00000-0000">
            <br><br>

            <label for="idade"> Idade: </label> <br>
            <input type="number" id="idade" required placeholder="000">
            <br><br>

            <label for="cidade"> Cidade:</label><br>
            <input type="text" id="cidade"  placeholder="Cidade">
            <br><br>

            <label for="estado"> Estado:</label><br>
            <input type="text" id="estado"  placeholder="Estado">
            <br><br>


            <label for="tipoSangue"> Tipo Sanguineo: </label><br><br>
            <select name="Tipo Sanguineo" id="tipoSangue" required>
                <option value=""> Selecione...</option>
                <option value="A+"> A+</option>
                <option value="A-"> A-</option>
                <option value="B+"> B+</option>
                <option value="B-"> B-</option>
                <option value="AB+"> AB+</option>
                <option value="AB-"> AB-</option>
                <option value="O+"> O+</option>
                <option value="O-"> O- </option>

            </select>
    <br><br>

            <div> 

                <img src="assets/image/DOACAO_SANGUE_01.jpg" alt="doeSangue!" class="imagemFixa">
                <img src="assets/image/imagem_02.png" alt="doacaoSangue" class="imagemFixa2">

            </div>
            

              <button type="submit"> Enviar </button>

              <div class="resultado_1" id="resultado"> </div>

        </form>

        </div>

        <script src="script/script.js"></script>











</body>

</html>
